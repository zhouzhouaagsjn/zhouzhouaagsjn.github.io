    <h1 id="title">如何培养<span>认真严谨</span>的习惯</h1>
    <p class="meta">
        时间<span>2022年02月21日17时26分</span>
        &nbsp;&nbsp;来源:<span>思政教育</span>
    </p>
    <div class="page">
        <div class="content">
        <img src="./1777305510277-222.jpg" alt="态度决定一切 细节决定成败">
        <ul class="points">
            <li><strong>反复确认</strong>，做任何事情都要照顾到每一个细节并反复确认，<strong>要有一种能在脑子里“虚拟”整个事件过程的能力</strong>，确保所有的节点都正常。</li>
            <li>想尽办法<strong>努力让不可能变为可能</strong>只有佣金全力做了，才算是努力</li>
            <li>结果导向<strong>一切以结果为导向，任何事情都是你的名片。</strong>还要思考你的结果和过程是否满足所有和你配合的人的需求</li>
            <li>学会假设了<strong>解周围比你强的人，观察他们的做事方法。</strong>遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</li>
        </ul>
        </div>
    </div>
